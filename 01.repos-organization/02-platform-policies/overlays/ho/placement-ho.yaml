apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-infra-ho
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: env
              operator: In
              values:
                - ho
            - key: vendor
              operator: In
              values:
                - ROSA
                - ARO
                - AKS
                - EKS
                - OCP
