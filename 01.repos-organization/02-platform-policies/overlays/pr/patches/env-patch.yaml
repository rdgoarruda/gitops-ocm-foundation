apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-multicloud
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: vendor
              operator: In
              values:
                - OpenShift
                - ROSA
                - ARO
                - AKS
                - EKS
            - key: environment
              operator: In
              values:
                - pr
