apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-ocm-foundation
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/rdgoarruda/gitops-ocm-foundation.git'
    targetRevision: main
    path: manifests/ocm-configs/argocd-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
